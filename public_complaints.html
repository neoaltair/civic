<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public Feed — CivicFix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script src="script.js"></script>

    <div class="dashboard-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-title">My Account</div>
            <ul class="sidebar-nav">
                <li><a href="citizen.html" class="sidebar-link">📊 Dashboard</a></li>
                <li><a href="submit_complaint.html" class="sidebar-link">➕ Submit Complaint</a></li>
                <li><a href="my_complaints.html" class="sidebar-link">📋 My Complaints</a></li>
                <li><a href="public_complaints.html" class="sidebar-link active">🌍 Public Feed</a></li>
                <li><a href="map.html" class="sidebar-link">🗺️ Community Map</a></li>
                <li><a href="announcements.html" class="sidebar-link">📢 Announcements</a></li>
                <li><a href="volunteer.html" class="sidebar-link">🤝 Volunteer</a></li>
                <li><a href="feedback.html" class="sidebar-link">⭐ Feedback</a></li>
            </ul>
            <div class="sidebar-footer">
                <a href="profile.html" class="sidebar-link">👤 Profile</a>
                <a href="#" onclick="Auth.logout()" class="sidebar-link" style="color:var(--danger)">🚪 Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div>
                    <h2>🌍 Public Complaints</h2>
                    <p class="text-secondary">Community issues — upvote to prioritize</p>
                </div>
                <div style="display:flex;gap:.5rem;">
                    <a href="map.html" class="btn btn-ghost btn-sm">🗺️ Map View</a>
                    <button class="btn btn-ghost btn-sm" id="sidebarToggle">☰</button>
                </div>
            </div>

            <div id="publicList"><p class="text-secondary">Loading…</p></div>
        </main>
    </div>

    <script>
        const user = Auth.check();
        UI.renderNavbar();

        async function init() {
            const complaints = (await Storage.getPublicComplaints()).reverse();
            renderList(complaints);
        }

        function renderList(complaints) {
            const container = document.getElementById('publicList');
            if (complaints.length === 0) {
                container.innerHTML = '<p class="text-secondary">No public complaints found.</p>';
                return;
            }
            container.innerHTML = complaints.map(c => `
                <div class="card ${UI.statusCardClass(c.status)} mb-sm"
                     onclick="window.location.href='complaint_details.html?id=${c.id}'" style="cursor:pointer;">
                    <div class="flex justify-between items-start">
                        <div style="flex:1;min-width:0;">
                            <div class="flex items-center gap-sm mb-xs">
                                <h4>${c.category}</h4>
                                ${UI.statusBadge(c.status)}
                            </div>
                            <p class="text-secondary text-sm">📍 ${c.location} &bull; by ${c.userName} &bull; ${UI.formatDate(c.timestamp)}</p>
                            <p class="text-sm mt-xs" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text-muted);">${c.description}</p>
                        </div>
                        ${c.imageUrl ? `<img src="${c.imageUrl}" style="width:60px;height:60px;object-fit:cover;border-radius:var(--r-md);margin-left:var(--sm);border:1px solid var(--border);" alt="">` : ''}
                    </div>
                    <div class="flex items-center gap-sm mt-sm pt-sm border-t" onclick="event.stopPropagation()">
                        <button class="btn ${c.upvotedBy && c.upvotedBy.includes(user.email) ? 'btn-primary' : 'btn-outline'} btn-sm"
                                onclick="upvote('${c.id}')">
                            👍 ${c.upvotedBy && c.upvotedBy.includes(user.email) ? 'Upvoted' : 'Upvote'} (${c.upvotes || 0})
                        </button>
                    </div>
                </div>
            `).join('');
        }

        async function upvote(id) {
            try {
                await Storage.upvoteComplaint(id);
                const complaints = (await Storage.getPublicComplaints()).reverse();
                renderList(complaints);
            } catch (e) {
                alert('Failed to upvote.');
            }
        }

        init();
    </script>
</body>
</html>
