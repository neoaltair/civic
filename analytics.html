<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics — CivicFix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script src="script.js"></script>

    <div class="dashboard-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-title">Admin Panel</div>
            <ul class="sidebar-nav">
                <li><a href="admin.html" class="sidebar-link">📊 Dashboard</a></li>
                <li><a href="manage_complaints.html" class="sidebar-link">📋 Manage Complaints</a></li>
                <li><a href="map.html" class="sidebar-link">🗺️ Community Map</a></li>
                <li><a href="analytics.html" class="sidebar-link active">📈 Analytics</a></li>
                <li><a href="announcements_admin.html" class="sidebar-link">📢 Announcements</a></li>
                <li><a href="manage_events.html" class="sidebar-link">📅 Events</a></li>
            </ul>
            <div class="sidebar-footer">
                <a href="profile.html" class="sidebar-link">👤 Profile</a>
                <a href="#" onclick="Auth.logout()" class="sidebar-link" style="color:var(--danger)">🚪 Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div><h2>📈 Analytics</h2><p class="text-secondary">Platform statistics overview</p></div>
                <button class="btn btn-ghost btn-sm" id="sidebarToggle">☰</button>
            </div>

            <!-- Stats Row -->
            <div class="grid grid-cols-3 gap-md mb-lg" style="grid-template-columns:repeat(4,1fr);">
                <div class="stat-card">
                    <div class="stat-label">Total</div>
                    <div class="stat-number" style="color:var(--info)" id="totalStat">—</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Pending</div>
                    <div class="stat-number" style="color:var(--danger)" id="pendingStat">—</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">In Progress</div>
                    <div class="stat-number" style="color:var(--warning)" id="progressStat">—</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Resolved</div>
                    <div class="stat-number" style="color:var(--success)" id="resolvedStat">—</div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-md">
                <div class="card">
                    <h3 class="mb-md">By Status</h3>
                    <div id="statusChart"></div>
                </div>
                <div class="card">
                    <h3 class="mb-md">By Category</h3>
                    <div id="categoryChart"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        Auth.checkAdmin();
        UI.renderNavbar();

        function renderBarChart(containerId, data, colorVar) {
            const container = document.getElementById(containerId);
            const max = Math.max(...Object.values(data), 1);
            const colors = {
                'Pending': 'var(--danger)', 'In Progress': 'var(--warning)',
                'Resolved': 'var(--success)', 'Rejected': 'var(--text-muted)',
            };
            container.innerHTML = Object.entries(data).map(([key, count]) => {
                const w = (count / max) * 100;
                const barColor = colors[key] || 'var(--accent)';
                return `
                    <div class="mb-sm">
                        <div class="flex justify-between mb-xs">
                            <span class="text-sm font-medium" style="color:var(--text);">${key}</span>
                            <span class="text-sm text-secondary">${count}</span>
                        </div>
                        <div style="background:var(--surface-2);height:8px;border-radius:4px;">
                            <div style="background:${barColor};height:100%;width:${w}%;border-radius:4px;transition:width .6s ease;"></div>
                        </div>
                    </div>
                `;
            }).join('') || '<p class="text-secondary text-sm">No data yet.</p>';
        }

        async function init() {
            const [stats, complaints] = await Promise.all([
                Storage.getAdminStats(),
                Storage.getComplaints(),
            ]);

            document.getElementById('totalStat').textContent    = stats.totalComplaints;
            document.getElementById('pendingStat').textContent  = stats.pending;
            document.getElementById('progressStat').textContent = stats.inProgress;
            document.getElementById('resolvedStat').textContent = stats.resolved;

            const statusCounts = {}, categoryCounts = {};
            complaints.forEach(c => {
                statusCounts[c.status]    = (statusCounts[c.status]    || 0) + 1;
                categoryCounts[c.category] = (categoryCounts[c.category] || 0) + 1;
            });

            renderBarChart('statusChart', statusCounts);
            renderBarChart('categoryChart', categoryCounts);
        }

        init();
    </script>
</body>
</html>
