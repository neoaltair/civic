<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Complaint — CivicFix</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>
    <script src="script.js"></script>

    <div class="dashboard-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-title">My Account</div>
            <ul class="sidebar-nav">
                <li><a href="citizen.html" class="sidebar-link">📊 Dashboard</a></li>
                <li><a href="submit_complaint.html" class="sidebar-link active">➕ Submit Complaint</a></li>
                <li><a href="my_complaints.html" class="sidebar-link">📋 My Complaints</a></li>
                <li><a href="public_complaints.html" class="sidebar-link">🌍 Public Feed</a></li>
                <li><a href="map.html" class="sidebar-link">🗺️ Community Map</a></li>
                <li><a href="announcements.html" class="sidebar-link">📢 Announcements</a></li>
                <li><a href="volunteer.html" class="sidebar-link">🤝 Volunteer</a></li>
                <li><a href="feedback.html" class="sidebar-link">⭐ Feedback</a></li>
            </ul>
            <div class="sidebar-footer">
                <a href="profile.html" class="sidebar-link">👤 Profile</a>
                <a href="#" onclick="Auth.logout()" class="sidebar-link" style="color:var(--danger)">🚪 Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div>
                    <h2>➕ Submit Complaint</h2>
                    <p class="text-secondary">Report a civic issue in your area</p>
                </div>
                <button class="btn btn-ghost btn-sm" id="sidebarToggle">☰</button>
            </div>

            <div class="card">
                <form id="complaintForm" enctype="multipart/form-data">
                    <div class="grid grid-cols-2 gap-md">
                        <div class="input-group">
                            <label for="category">Category</label>
                            <select id="category" class="input-control" required>
                                <option value="">Select category…</option>
                                <option>Roads & Potholes</option>
                                <option>Garbage Collection</option>
                                <option>Street Lighting</option>
                                <option>Water Supply</option>
                                <option>Sewage & Drainage</option>
                                <option>Public Property</option>
                                <option>Noise Complaint</option>
                                <option>Other</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="location">Location / Area</label>
                            <input type="text" id="location" class="input-control" placeholder="e.g. Anna Nagar, Chennai" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="description">Description</label>
                        <textarea id="description" class="input-control" rows="4" placeholder="Describe the issue in detail…" required></textarea>
                    </div>

                    <div class="input-group">
                        <label for="image">Attach Photo (optional)</label>
                        <input type="file" id="image" class="input-control" accept="image/*">
                        <img id="imagePreview" class="image-preview hidden" alt="Preview">
                    </div>

                    <div class="input-group">
                        <label>
                            <input type="checkbox" id="isPublic" checked style="accent-color:var(--accent);margin-right:.5rem;">
                            Make this complaint public (visible to community)
                        </label>
                    </div>

                    <!-- Map -->
                    <div class="input-group">
                        <label>Pin Location on Map <span class="text-muted text-sm">(optional — click to set)</span></label>
                        <div id="map" style="height:300px;border-radius:var(--r-md);border:1px solid var(--border);"></div>
                        <p id="location-status" class="text-secondary text-sm mt-xs">No pin placed yet</p>
                        <input type="hidden" id="lat">
                        <input type="hidden" id="lng">
                    </div>

                    <div id="submitMsg"></div>
                    <button type="submit" class="btn btn-primary" id="submitBtn">🚀 Submit Complaint</button>
                </form>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const user = Auth.check();
        UI.renderNavbar();

        // Image preview
        document.getElementById('image').addEventListener('change', (e) => {
            const file = e.target.files[0];
            const preview = document.getElementById('imagePreview');
            if (file) {
                preview.src = URL.createObjectURL(file);
                preview.classList.remove('hidden');
            } else {
                preview.classList.add('hidden');
            }
        });

        // Map
        const map = L.map('map').setView([13.0827, 80.2707], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap © CartoDB',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        let marker;
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                map.setView([pos.coords.latitude, pos.coords.longitude], 15);
            });
        }

        map.on('click', (e) => {
            const { lat, lng } = e.latlng;
            if (marker) { marker.setLatLng(e.latlng); }
            else { marker = L.marker(e.latlng).addTo(map); }
            document.getElementById('lat').value = lat;
            document.getElementById('lng').value = lng;
            document.getElementById('location-status').textContent =
                `📍 Pinned: ${lat.toFixed(5)}, ${lng.toFixed(5)}`;
        });

        // Submit
        document.getElementById('complaintForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const msgEl = document.getElementById('submitMsg');
            btn.textContent = 'Submitting…';
            btn.disabled = true;

            const fd = new FormData();
            fd.append('category',    document.getElementById('category').value);
            fd.append('location',    document.getElementById('location').value);
            fd.append('description', document.getElementById('description').value);
            fd.append('isPublic',    document.getElementById('isPublic').checked ? 'true' : 'false');
            const lat = document.getElementById('lat').value;
            const lng = document.getElementById('lng').value;
            if (lat) fd.append('lat', lat);
            if (lng) fd.append('lng', lng);
            const imageFile = document.getElementById('image').files[0];
            if (imageFile) fd.append('image', imageFile);

            try {
                await Storage.addComplaint(fd);
                msgEl.innerHTML = '<div class="msg-box msg-success">✓ Complaint submitted!</div>';
                setTimeout(() => window.location.href = 'my_complaints.html', 1200);
            } catch (err) {
                msgEl.innerHTML = `<div class="msg-box msg-error">✗ ${err.message}</div>`;
                btn.textContent = '🚀 Submit Complaint';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
