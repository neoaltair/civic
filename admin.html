<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — CivicFix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script src="script.js"></script>

    <div class="dashboard-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-title">Admin Panel</div>
            <ul class="sidebar-nav">
                <li><a href="admin.html" class="sidebar-link active">📊 Dashboard</a></li>
                <li><a href="manage_complaints.html" class="sidebar-link">📋 Manage Complaints</a></li>
                <li><a href="map.html" class="sidebar-link">🗺️ Community Map</a></li>
                <li><a href="analytics.html" class="sidebar-link">📈 Analytics</a></li>
                <li><a href="announcements_admin.html" class="sidebar-link">📢 Announcements</a></li>
                <li><a href="manage_events.html" class="sidebar-link">📅 Events</a></li>
            </ul>
            <div class="sidebar-footer">
                <a href="profile.html" class="sidebar-link">👤 Profile</a>
                <a href="#" onclick="Auth.logout()" class="sidebar-link" style="color:var(--danger)">🚪 Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div>
                    <h2>Admin Dashboard</h2>
                    <p class="text-secondary">Platform-wide overview</p>
                </div>
                <button class="btn btn-ghost btn-sm" id="sidebarToggle">☰</button>
            </div>

            <!-- Stats -->
            <div class="grid grid-cols-3 gap-md mb-lg">
                <div class="stat-card">
                    <div class="stat-label">Pending</div>
                    <div class="stat-number" style="color:var(--danger)" id="pendingCount">—</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Resolved</div>
                    <div class="stat-number" style="color:var(--success)" id="resolvedCount">—</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Users</div>
                    <div class="stat-number" style="color:var(--accent)" id="userCount">—</div>
                </div>
            </div>

            <!-- Recent Complaints -->
            <div class="card">
                <div class="flex justify-between items-center mb-md">
                    <h3>Recent Submissions</h3>
                    <a href="manage_complaints.html" class="btn btn-ghost btn-sm">Manage All</a>
                </div>
                <div id="recentComplaints">
                    <p class="text-secondary">Loading…</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        Auth.checkAdmin();
        UI.renderNavbar();

        async function init() {
            const [stats, complaints] = await Promise.all([
                Storage.getAdminStats(),
                Storage.getComplaints(),
            ]);

            document.getElementById('pendingCount').textContent = stats.pending;
            document.getElementById('resolvedCount').textContent = stats.resolved;
            document.getElementById('userCount').textContent = stats.totalUsers;

            const recent = complaints.slice().reverse().slice(0, 5);
            const container = document.getElementById('recentComplaints');

            if (recent.length === 0) {
                container.innerHTML = '<p class="text-secondary">No complaints in the system yet.</p>';
            } else {
                container.innerHTML = recent.map(c => `
                    <a href="complaint_details.html?id=${c.id}" style="text-decoration:none;">
                        <div class="card ${UI.statusCardClass(c.status)} mb-sm" style="padding:var(--sm);">
                            <div class="flex justify-between items-center">
                                <div>
                                    <strong>${c.category}</strong>
                                    <p class="text-sm text-secondary mt-xs">by ${c.userName} · 📍 ${c.location} · ${UI.formatDate(c.timestamp)}</p>
                                </div>
                                ${UI.statusBadge(c.status)}
                            </div>
                        </div>
                    </a>
                `).join('');
            }
        }

        init();
    </script>
</body>
</html>
