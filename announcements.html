<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Announcements - CivicFix</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Navbar injected by script.js -->

    <div class="dashboard-layout">
        <aside class="sidebar">
            <h3 class="mb-lg" style="padding-left: 1rem;">Menu</h3>
            <ul class="sidebar-nav">
                <li><a href="citizen.html" class="sidebar-link">Dashboard</a></li>
                <li><a href="submit_complaint.html" class="sidebar-link">Submit Complaint</a></li>
                <li><a href="my_complaints.html" class="sidebar-link">My Complaints</a></li>
                <li><a href="public_complaints.html" class="sidebar-link">Public Complaints</a></li>
                <li><a href="announcements.html" class="sidebar-link active">Announcements</a></li>
                <li><a href="feedback.html" class="sidebar-link">Feedback</a></li>
                <li><a href="volunteer.html" class="sidebar-link">Volunteer</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <h2 class="mb-lg">Official Announcements</h2>

            <div id="announcementList" class="flex flex-col gap-md">
                <!-- Loaded dynamically -->
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        const user = Auth.check();
        UI.renderNavbar();

        async function init() {
            const announcements = (await Storage.getAnnouncements()).reverse();
            const container = document.getElementById('announcementList');

            if (announcements.length === 0) {
                container.innerHTML = '<p class="text-secondary">No announcements available at this time.</p>';
            } else {
                container.innerHTML = announcements.map(a => `
                    <div class="card" style="border-left: 5px solid var(--secondary-color);">
                        <div class="flex justify-between items-center mb-sm">
                            <h3 style="font-size: 1.25rem;">${a.title}</h3>
                            <span class="text-secondary" style="font-size: 0.875rem;">${UI.formatDate(a.timestamp)}</span>
                        </div>
                        <p>${a.content}</p>
                    </div>
                `).join('');
            }
        }

        init();
    </script>
</body>

</html>
