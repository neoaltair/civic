<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Complaints — CivicFix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script src="script.js"></script>

    <div class="dashboard-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-title">My Account</div>
            <ul class="sidebar-nav">
                <li><a href="citizen.html" class="sidebar-link">📊 Dashboard</a></li>
                <li><a href="submit_complaint.html" class="sidebar-link">➕ Submit Complaint</a></li>
                <li><a href="my_complaints.html" class="sidebar-link active">📋 My Complaints</a></li>
                <li><a href="public_complaints.html" class="sidebar-link">🌍 Public Feed</a></li>
                <li><a href="map.html" class="sidebar-link">🗺️ Community Map</a></li>
                <li><a href="announcements.html" class="sidebar-link">📢 Announcements</a></li>
                <li><a href="volunteer.html" class="sidebar-link">🤝 Volunteer</a></li>
                <li><a href="feedback.html" class="sidebar-link">⭐ Feedback</a></li>
            </ul>
            <div class="sidebar-footer">
                <a href="profile.html" class="sidebar-link">👤 Profile</a>
                <a href="#" onclick="Auth.logout()" class="sidebar-link" style="color:var(--danger)">🚪 Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div>
                    <h2>📋 My Complaints</h2>
                    <p class="text-secondary">All issues you've submitted</p>
                </div>
                <div style="display:flex;gap:.5rem;">
                    <a href="submit_complaint.html" class="btn btn-primary btn-sm">➕ New</a>
                    <button class="btn btn-ghost btn-sm" id="sidebarToggle">☰</button>
                </div>
            </div>

            <div id="complaintsList"><p class="text-secondary">Loading…</p></div>
        </main>
    </div>

    <script>
        const user = Auth.check();
        UI.renderNavbar();

        async function init() {
            const allComplaints = await Storage.getComplaints();
            const complaints = allComplaints.filter(c => c.userEmail === user.email).reverse();
            const container = document.getElementById('complaintsList');

            if (complaints.length === 0) {
                container.innerHTML = `
                    <div class="card text-center p-xl">
                        <p class="text-secondary text-lg mb-md">You haven't submitted any complaints yet.</p>
                        <a href="submit_complaint.html" class="btn btn-primary">Submit Your First Issue</a>
                    </div>
                `;
                return;
            }

            container.innerHTML = complaints.map(c => `
                <div class="card ${UI.statusCardClass(c.status)} mb-sm"
                     onclick="window.location.href='complaint_details.html?id=${c.id}'" style="cursor:pointer;">
                    <div class="flex justify-between items-start">
                        <div style="flex:1;min-width:0;">
                            <div class="flex items-center gap-sm mb-xs">
                                <h4>${c.category}</h4>
                                ${UI.statusBadge(c.status)}
                            </div>
                            <p class="text-secondary text-sm">📍 ${c.location} &bull; ${UI.formatDate(c.timestamp)}</p>
                            <p class="text-sm mt-xs" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text-muted);">${c.description}</p>
                            ${c.remarks ? `
                                <div style="margin-top:.5rem;padding:.4rem .6rem;background:var(--success-dim);border-radius:var(--r-sm);font-size:.82rem;color:var(--success);">
                                    💬 Admin: ${c.remarks}
                                </div>
                            ` : ''}
                        </div>
                        ${c.imageUrl ? `<img src="${c.imageUrl}" style="width:60px;height:60px;object-fit:cover;border-radius:var(--r-md);margin-left:var(--sm);border:1px solid var(--border);" alt="">` : ''}
                    </div>
                    ${c.status === 'Resolved' ? `
                        <div class="mt-sm pt-sm border-t">
                            <a href="feedback.html?id=${c.id}" class="btn btn-ghost btn-sm" onclick="event.stopPropagation()">⭐ Give Feedback</a>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        init();
    </script>
</body>
</html>
