<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — CivicFix</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--lg);
        }
        .auth-card {
            width: 100%;
            max-width: 460px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r-xl);
            padding: var(--xl);
        }
        .auth-brand { text-align: center; margin-bottom: var(--lg); }
        .auth-brand h1 { font-family: var(--font-head); font-size: 2.2rem; font-weight: 800; }
        .auth-brand .dot { color: var(--accent); }
        .auth-brand p { color: var(--text-muted); font-size: .9rem; margin-top: .35rem; }
        .admin-toggle {
            display: flex;
            align-items: center;
            gap: .6rem;
            padding: .7rem var(--sm);
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--r-md);
            cursor: pointer;
            font-size: .9rem;
        }
        .admin-toggle input[type="checkbox"] { accent-color: var(--accent); width: 16px; height: 16px; }
    </style>
</head>
<body>
    <script src="script.js"></script>
    <script>UI.renderNavbar();</script>

    <div class="auth-wrap">
        <div class="auth-card">
            <div class="auth-brand">
                <h1>CivicFix<span class="dot">.</span></h1>
                <p>Create your account</p>
            </div>

            <div id="message" class="hidden"></div>

            <form id="registerForm">
                <div class="input-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" class="input-control" placeholder="Your full name" required>
                </div>
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="input-control" placeholder="you@example.com" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="input-control" placeholder="Minimum 6 characters" required>
                </div>
                <div class="input-group">
                    <label class="admin-toggle">
                        <input type="checkbox" id="isAdmin">
                        Register as Administrator
                    </label>
                </div>
                <button type="submit" class="btn btn-primary w-100" id="registerBtn">Create Account</button>
            </form>

            <p class="text-center mt-md text-secondary text-sm">
                Already have an account? <a href="login.html" style="color:var(--accent);">Sign in</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const isAdmin = document.getElementById('isAdmin').checked;
            const btn = document.getElementById('registerBtn');
            const msg = document.getElementById('message');

            btn.textContent = 'Creating account…';
            btn.disabled = true;

            const result = await Auth.register(name, email, password, isAdmin ? 'admin' : 'citizen');
            btn.textContent = 'Create Account';
            btn.disabled = false;

            msg.classList.remove('hidden');
            if (result.success) {
                msg.className = 'msg-box msg-success';
                msg.textContent = '✓ Account created! Redirecting to login…';
                setTimeout(() => window.location.href = 'login.html', 1200);
            } else {
                msg.className = 'msg-box msg-error';
                msg.textContent = '✗ ' + result.message;
            }
        });
    </script>
</body>
</html>
