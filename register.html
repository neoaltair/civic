<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CivicFix</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Navbar injected by script.js -->

    <main class="container flex justify-center items-center" style="min-height: 80vh;">
        <div class="card" style="width: 100%; max-width: 450px;">
            <h2 class="text-center mb-lg">Create Account</h2>

            <form id="registerForm">
                <div class="input-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" class="input-control" required placeholder="John Doe">
                </div>

                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="input-control" required placeholder="john@example.com">
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="input-control" required placeholder="••••••••">
                </div>

                <!-- Hidden admin registration trick for demo purposes -->
                <div class="input-group">
                    <label class="text-secondary" style="font-size: 0.8rem;">
                        <input type="checkbox" id="isAdmin"> Register as Admin (Demo Only)
                    </label>
                </div>

                <div id="message" class="mb-md text-center hidden"></div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign Up</button>
            </form>

            <p class="text-center mt-md text-secondary">
                Already have an account? <a href="login.html">Login</a>
            </p>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        UI.renderNavbar();

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const isAdmin = document.getElementById('isAdmin').checked;

            const msg = document.getElementById('message');
            msg.textContent = 'Registering…';
            msg.className = 'mb-md text-center text-secondary';
            msg.classList.remove('hidden');

            const result = await Auth.register(name, email, password, isAdmin ? 'admin' : 'citizen');

            msg.textContent = result.message;
            if (result.success) {
                msg.className = 'mb-md text-center text-success';
                setTimeout(() => window.location.href = 'login.html', 1200);
            } else {
                msg.className = 'mb-md text-center text-danger';
            }
        });
    </script>
</body>

</html>
