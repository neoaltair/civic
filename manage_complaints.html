<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Complaints — CivicFix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script src="script.js"></script>

    <div class="dashboard-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-title">Admin Panel</div>
            <ul class="sidebar-nav">
                <li><a href="admin.html" class="sidebar-link">📊 Dashboard</a></li>
                <li><a href="manage_complaints.html" class="sidebar-link active">📋 Manage Complaints</a></li>
                <li><a href="map.html" class="sidebar-link">🗺️ Community Map</a></li>
                <li><a href="analytics.html" class="sidebar-link">📈 Analytics</a></li>
                <li><a href="announcements_admin.html" class="sidebar-link">📢 Announcements</a></li>
                <li><a href="manage_events.html" class="sidebar-link">📅 Events</a></li>
            </ul>
            <div class="sidebar-footer">
                <a href="profile.html" class="sidebar-link">👤 Profile</a>
                <a href="#" onclick="Auth.logout()" class="sidebar-link" style="color:var(--danger)">🚪 Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div>
                    <h2>📋 Manage Complaints</h2>
                    <p class="text-secondary">Review and update complaint statuses</p>
                </div>
                <div style="display:flex;gap:.5rem;align-items:center;">
                    <select id="filterStatus" class="input-control" style="width:auto;padding:.4rem .8rem;">
                        <option value="all">All Statuses</option>
                        <option value="Pending">Pending</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Resolved">Resolved</option>
                        <option value="Rejected">Rejected</option>
                    </select>
                    <button class="btn btn-ghost btn-sm" id="sidebarToggle">☰</button>
                </div>
            </div>

            <div id="complaintsList"><p class="text-secondary">Loading…</p></div>
        </main>
    </div>

    <script>
        Auth.checkAdmin();
        UI.renderNavbar();

        let allComplaints = [];

        async function renderComplaints() {
            allComplaints = await Storage.getComplaints();
            const filter = document.getElementById('filterStatus').value;
            let complaints = allComplaints.slice().reverse();
            if (filter !== 'all') complaints = complaints.filter(c => c.status === filter);

            const container = document.getElementById('complaintsList');
            if (complaints.length === 0) {
                container.innerHTML = '<p class="text-secondary">No complaints match this filter.</p>';
                return;
            }

            container.innerHTML = complaints.map(c => `
                <div class="card ${UI.statusCardClass(c.status)} mb-sm">
                    <div class="flex justify-between items-start mb-sm">
                        <div>
                            <div class="flex items-center gap-sm mb-xs">
                                <h4>${c.category}</h4>
                                ${UI.statusBadge(c.status)}
                                <code class="mono">#${c.id.substring(0,8)}</code>
                            </div>
                            <p class="text-secondary text-sm">👤 <strong style="color:var(--text)">${c.userName}</strong> (${c.userEmail}) &bull; 📍 ${c.location} &bull; ${UI.formatDate(c.timestamp)}</p>
                        </div>
                        ${c.imageUrl ? `<img src="${c.imageUrl}" style="width:56px;height:56px;object-fit:cover;border-radius:var(--r-sm);border:1px solid var(--border);flex-shrink:0;" alt="">` : ''}
                    </div>

                    <p class="text-sm mb-sm" style="background:var(--surface-2);padding:.5rem .75rem;border-radius:var(--r-sm);border-left:3px solid var(--border-light);color:var(--text);">${c.description}</p>

                    <div class="flex gap-sm" style="flex-wrap:wrap;">
                        <select id="status-${c.id}" class="input-control" style="width:auto;padding:.4rem .7rem;flex-shrink:0;">
                            <option value="Pending"     ${c.status === 'Pending'     ? 'selected' : ''}>Pending</option>
                            <option value="In Progress" ${c.status === 'In Progress' ? 'selected' : ''}>In Progress</option>
                            <option value="Resolved"    ${c.status === 'Resolved'    ? 'selected' : ''}>Resolved</option>
                            <option value="Rejected"    ${c.status === 'Rejected'    ? 'selected' : ''}>Rejected</option>
                        </select>
                        <input type="text" id="remark-${c.id}" class="input-control" placeholder="Add remark…"
                               value="${c.remarks || ''}" style="flex:1;min-width:200px;padding:.4rem .7rem;">
                        <button onclick="updateStatus('${c.id}')" class="btn btn-primary btn-sm">Update</button>
                        <a href="complaint_details.html?id=${c.id}" class="btn btn-ghost btn-sm">View</a>
                    </div>
                </div>
            `).join('');
        }

        async function updateStatus(id) {
            const status = document.getElementById(`status-${id}`).value;
            const remarks = document.getElementById(`remark-${id}`).value;
            try {
                await Storage.updateComplaint(id, { status, remarks: remarks || undefined });
                renderComplaints();
            } catch (err) {
                alert('Failed to update: ' + err.message);
            }
        }

        document.getElementById('filterStatus').addEventListener('change', renderComplaints);
        renderComplaints();
    </script>
</body>
</html>
