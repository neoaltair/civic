<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Events - CivicFix Admin</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Navbar injected by script.js -->

    <div class="dashboard-layout">
        <aside class="sidebar" style="background-color: #f1f5f9;">
            <h3 class="mb-lg" style="padding-left: 1rem;">Admin Panel</h3>
            <ul class="sidebar-nav">
                <li><a href="admin.html" class="sidebar-link">Dashboard</a></li>
                <li><a href="manage_complaints.html" class="sidebar-link">Manage Complaints</a></li>
                <li><a href="manage_events.html" class="sidebar-link active">Manage Events</a></li>
                <li><a href="analytics.html" class="sidebar-link">Analytics</a></li>
                <li><a href="announcements_admin.html" class="sidebar-link">Announcements</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <h2 class="mb-lg">Manage Events</h2>

            <div class="card mb-xl">
                <h3>Create New Event</h3>
                <form id="eventForm" class="mt-md">
                    <div class="input-group">
                        <label for="title">Event Title</label>
                        <input type="text" id="title" class="input-control" required
                            placeholder="e.g. Beach Cleanup Drive">
                    </div>
                    <div class="grid grid-cols-2 gap-md">
                        <div class="input-group">
                            <label for="date">Date & Time</label>
                            <input type="datetime-local" id="date" class="input-control" required>
                        </div>
                        <div class="input-group">
                            <label for="location">Location</label>
                            <input type="text" id="location" class="input-control" required
                                placeholder="e.g. Marina Beach">
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="description">Description</label>
                        <textarea id="description" class="input-control" rows="3" required
                            placeholder="Event details..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Create Event</button>
                </form>
            </div>

            <h3 class="mb-md">Active Events</h3>
            <div id="eventsList" class="flex flex-col gap-md">
                <!-- Loaded dynamically -->
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        Auth.checkAdmin();
        UI.renderNavbar();

        function renderEvents() {
            const events = Storage.getEvents().reverse();
            const container = document.getElementById('eventsList');

            if (events.length === 0) {
                container.innerHTML = '<p class="text-secondary">No active events.</p>';
            } else {
                container.innerHTML = events.map(e => `
                    <div class="card p-md flex justify-between items-center">
                        <div>
                            <h4>${e.title}</h4>
                            <p class="text-secondary text-sm">📅 ${new Date(e.date).toLocaleString()} &bull; 📍 ${e.location}</p>
                            <p class="mt-xs text-sm">${e.description}</p>
                            <p class="mt-xs text-sm font-bold text-success">${e.attendees.length} Attendees</p>
                        </div>
                        <button onclick="deleteEvent('${e.id}')" class="btn btn-outline text-danger" style="border-color: var(--danger-color); padding: 0.25rem 0.75rem;">Delete</button>
                    </div>
                `).join('');
            }
        }

        document.getElementById('eventForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const title = document.getElementById('title').value;
            const date = document.getElementById('date').value;
            const location = document.getElementById('location').value;
            const description = document.getElementById('description').value;

            Storage.addEvent({ title, date, location, description });
            alert('Event created successfully!');
            e.target.reset();
            renderEvents();
        });

        function deleteEvent(id) {
            if (confirm('Are you sure you want to delete this event?')) {
                Storage.deleteEvent(id);
                renderEvents();
            }
        }

        renderEvents();
    </script>
</body>

</html>
