<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Events — CivicFix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script src="script.js"></script>

    <div class="dashboard-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-title">Admin Panel</div>
            <ul class="sidebar-nav">
                <li><a href="admin.html" class="sidebar-link">📊 Dashboard</a></li>
                <li><a href="manage_complaints.html" class="sidebar-link">📋 Manage Complaints</a></li>
                <li><a href="map.html" class="sidebar-link">🗺️ Community Map</a></li>
                <li><a href="analytics.html" class="sidebar-link">📈 Analytics</a></li>
                <li><a href="announcements_admin.html" class="sidebar-link">📢 Announcements</a></li>
                <li><a href="manage_events.html" class="sidebar-link active">📅 Events</a></li>
            </ul>
            <div class="sidebar-footer">
                <a href="profile.html" class="sidebar-link">👤 Profile</a>
                <a href="#" onclick="Auth.logout()" class="sidebar-link" style="color:var(--danger)">🚪 Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div><h2>📅 Manage Events</h2></div>
                <button class="btn btn-ghost btn-sm" id="sidebarToggle">☰</button>
            </div>

            <!-- Create form -->
            <div class="card mb-md">
                <h3 class="mb-md">Create New Event</h3>
                <div id="formMsg"></div>
                <form id="eventForm">
                    <div class="grid grid-cols-2 gap-md">
                        <div class="input-group">
                            <label for="title">Event Title</label>
                            <input type="text" id="title" class="input-control" placeholder="Event name" required>
                        </div>
                        <div class="input-group">
                            <label for="location">Location</label>
                            <input type="text" id="location" class="input-control" placeholder="Venue or area" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="date">Date & Time</label>
                        <input type="datetime-local" id="date" class="input-control" required>
                    </div>
                    <div class="input-group">
                        <label for="description">Description</label>
                        <textarea id="description" class="input-control" rows="3" placeholder="Event details…" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">📅 Create Event</button>
                </form>
            </div>

            <!-- Events list -->
            <div class="card">
                <h3 class="mb-md">Active Events</h3>
                <div id="eventsList"><p class="text-secondary">Loading…</p></div>
            </div>
        </main>
    </div>

    <script>
        Auth.checkAdmin();
        UI.renderNavbar();

        async function renderEvents() {
            const events = (await Storage.getEvents()).reverse();
            const container = document.getElementById('eventsList');
            if (events.length === 0) {
                container.innerHTML = '<p class="text-secondary">No events created yet.</p>';
                return;
            }
            container.innerHTML = events.map(e => `
                <div class="card event-card mb-sm" style="padding:var(--sm);">
                    <div class="flex justify-between items-center">
                        <div>
                            <strong>${e.title}</strong>
                            <p class="text-secondary text-sm mt-xs">📅 ${new Date(e.date).toLocaleString()} &bull; 📍 ${e.location}</p>
                            <p class="text-sm mt-xs" style="color:var(--text-muted);">${e.description}</p>
                            <p class="text-sm mt-xs" style="color:var(--success);">👥 ${e.attendees.length} volunteers</p>
                        </div>
                        <button onclick="deleteEv('${e.id}')" class="btn btn-ghost btn-sm" style="color:var(--danger);border-color:var(--danger-dim);margin-left:var(--sm);">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('eventForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = document.getElementById('formMsg');
            try {
                await Storage.addEvent({
                    title: document.getElementById('title').value,
                    date: document.getElementById('date').value,
                    location: document.getElementById('location').value,
                    description: document.getElementById('description').value,
                });
                msg.innerHTML = '<div class="msg-box msg-success">✓ Event created!</div>';
                e.target.reset();
                renderEvents();
            } catch {
                msg.innerHTML = '<div class="msg-box msg-error">✗ Failed to create event.</div>';
            }
        });

        async function deleteEv(id) {
            if (confirm('Delete this event?')) {
                try { await Storage.deleteEvent(id); renderEvents(); }
                catch { alert('Delete failed.'); }
            }
        }

        renderEvents();
    </script>
</body>
</html>
