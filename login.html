<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — CivicFix</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--lg);
        }
        .auth-card {
            width: 100%;
            max-width: 420px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r-xl);
            padding: var(--xl);
        }
        .auth-brand {
            text-align: center;
            margin-bottom: var(--lg);
        }
        .auth-brand h1 {
            font-family: var(--font-head);
            font-size: 2.2rem;
            font-weight: 800;
        }
        .auth-brand .dot { color: var(--accent); }
        .auth-brand p { color: var(--text-muted); font-size: .9rem; margin-top: .35rem; }
    </style>
</head>
<body>
    <script src="script.js"></script>
    <script>UI.renderNavbar();</script>

    <div class="auth-wrap">
        <div class="auth-card">
            <div class="auth-brand">
                <h1>CivicFix<span class="dot">.</span></h1>
                <p>Sign in to your account</p>
            </div>

            <div id="message" class="hidden"></div>

            <form id="loginForm">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="input-control" placeholder="you@example.com" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="input-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary w-100" id="loginBtn" style="margin-top:.5rem;">
                    Sign In
                </button>
            </form>

            <p class="text-center mt-md text-secondary text-sm">
                Don't have an account? <a href="register.html" style="color:var(--accent);">Create one</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const msg = document.getElementById('message');

            btn.textContent = 'Signing in…';
            btn.disabled = true;

            const result = await Auth.login(email, password);
            btn.textContent = 'Sign In';
            btn.disabled = false;

            const msgEl = document.getElementById('message');
            msgEl.classList.remove('hidden');

            if (result.success) {
                msgEl.className = 'msg-box msg-success';
                msgEl.textContent = '✓ Login successful! Redirecting…';
                setTimeout(() => {
                    window.location.href = result.user.role === 'admin' ? 'admin.html' : 'citizen.html';
                }, 800);
            } else {
                msgEl.className = 'msg-box msg-error';
                msgEl.textContent = '✗ ' + result.message;
            }
        });
    </script>
</body>
</html>
