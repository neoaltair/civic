<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaint Details — CivicFix</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>
    <script src="script.js"></script>

    <div class="dashboard-layout">
        <div id="sidebarContainer"></div>

        <main class="main-content">
            <div class="page-header">
                <div>
                    <a href="javascript:history.back()" class="btn btn-ghost btn-sm" style="margin-bottom:.5rem;">← Back</a>
                    <h2>Complaint Details</h2>
                </div>
                <button class="btn btn-ghost btn-sm" id="sidebarToggle">☰</button>
            </div>

            <div id="complaintContainer">
                <div class="card"><p class="text-secondary">Loading…</p></div>
            </div>

            <!-- Comments Section -->
            <div class="card mt-md" id="commentsSection" style="display:none;">
                <h3 class="mb-md">💬 Discussion</h3>
                <div id="commentsList" class="comment-thread mb-md"></div>

                <div style="display:flex;gap:.5rem;margin-top:var(--sm);">
                    <input type="text" id="commentInput" class="input-control"
                           placeholder="Add a comment…" style="flex:1;">
                    <button class="btn btn-primary btn-sm" id="commentSubmit">Post</button>
                </div>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const user = Auth.check();
        UI.renderNavbar();
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        // Build sidebar by role
        const sc = document.getElementById('sidebarContainer');
        if (user.role === 'admin') {
            sc.innerHTML = `<aside class="sidebar" id="sidebar">
                <div class="sidebar-title">Admin Panel</div>
                <ul class="sidebar-nav">
                    <li><a href="admin.html" class="sidebar-link">📊 Dashboard</a></li>
                    <li><a href="manage_complaints.html" class="sidebar-link active">📋 Complaints</a></li>
                    <li><a href="map.html" class="sidebar-link">🗺️ Community Map</a></li>
                    <li><a href="analytics.html" class="sidebar-link">📈 Analytics</a></li>
                    <li><a href="announcements_admin.html" class="sidebar-link">📢 Announcements</a></li>
                    <li><a href="manage_events.html" class="sidebar-link">📅 Events</a></li>
                </ul>
                <div class="sidebar-footer">
                    <a href="profile.html" class="sidebar-link">👤 Profile</a>
                    <a href="#" onclick="Auth.logout()" class="sidebar-link" style="color:var(--danger)">🚪 Logout</a>
                </div>
            </aside>`;
        } else {
            sc.innerHTML = `<aside class="sidebar" id="sidebar">
                <div class="sidebar-title">My Account</div>
                <ul class="sidebar-nav">
                    <li><a href="citizen.html" class="sidebar-link">📊 Dashboard</a></li>
                    <li><a href="my_complaints.html" class="sidebar-link active">📋 My Complaints</a></li>
                    <li><a href="public_complaints.html" class="sidebar-link">🌍 Public Feed</a></li>
                    <li><a href="map.html" class="sidebar-link">🗺️ Community Map</a></li>
                    <li><a href="announcements.html" class="sidebar-link">📢 Announcements</a></li>
                    <li><a href="volunteer.html" class="sidebar-link">🤝 Volunteer</a></li>
                    <li><a href="feedback.html" class="sidebar-link">⭐ Feedback</a></li>
                </ul>
                <div class="sidebar-footer">
                    <a href="profile.html" class="sidebar-link">👤 Profile</a>
                    <a href="#" onclick="Auth.logout()" class="sidebar-link" style="color:var(--danger)">🚪 Logout</a>
                </div>
            </aside>`;
        }

        async function init() {
            if (!id) {
                document.getElementById('complaintContainer').innerHTML =
                    '<div class="card"><p class="text-danger">Invalid complaint ID.</p></div>';
                return;
            }

            const c = await Storage.getComplaintById(id);
            if (!c) {
                document.getElementById('complaintContainer').innerHTML =
                    '<div class="card"><p class="text-danger">Complaint not found.</p></div>';
                return;
            }

            renderDetails(c);
            loadComments();
        }

        function renderDetails(c) {
            const container = document.getElementById('complaintContainer');
            container.innerHTML = `
                <div class="card ${UI.statusCardClass(c.status)}">
                    <!-- Header -->
                    <div class="flex justify-between items-start mb-md">
                        <div>
                            <h3 style="font-size:1.5rem;">${c.category}</h3>
                            <p class="text-secondary text-sm mt-xs">
                                <code class="mono">#${c.id.substring(0,8)}</code> &bull; ${UI.formatDate(c.timestamp)}
                            </p>
                        </div>
                        ${UI.statusBadge(c.status)}
                    </div>

                    <!-- Meta grid -->
                    <div class="grid grid-cols-2 gap-md mb-md">
                        <div style="background:var(--surface-2);padding:var(--sm);border-radius:var(--r-md);">
                            <div class="text-sm uppercase text-secondary mb-xs" style="letter-spacing:.07em;">Location</div>
                            <strong>📍 ${c.location}</strong>
                        </div>
                        <div style="background:var(--surface-2);padding:var(--sm);border-radius:var(--r-md);">
                            <div class="text-sm uppercase text-secondary mb-xs" style="letter-spacing:.07em;">Reported By</div>
                            <strong>${c.userName} ${c.isPublic ? '' : '<span class="badge badge-rejected">Private</span>'}</strong>
                        </div>
                    </div>

                    <!-- Description -->
                    <h4 class="mb-xs">Description</h4>
                    <p style="line-height:1.8;color:var(--text);">${c.description}</p>

                    <!-- Image -->
                    ${c.imageUrl ? `
                        <div class="mt-md">
                            <h4 class="mb-xs">Photo Evidence</h4>
                            <img src="${c.imageUrl}" class="image-preview" alt="Complaint photo">
                        </div>
                    ` : ''}

                    <!-- Map -->
                    ${c.coordinates ? `
                        <div class="mt-md">
                            <h4 class="mb-xs">Pinned Location</h4>
                            <div id="detailMap" style="height:280px;"></div>
                        </div>
                    ` : ''}

                    <!-- Upvotes -->
                    <div class="flex items-center gap-md mt-md pt-sm border-t" style="margin-top:var(--md);padding-top:var(--sm);">
                        <button class="btn ${c.upvotedBy && c.upvotedBy.includes(user.email) ? 'btn-primary' : 'btn-outline'} btn-sm"
                                id="upvoteBtn" onclick="upvote('${c.id}')">
                            👍 ${c.upvotedBy && c.upvotedBy.includes(user.email) ? 'Upvoted' : 'Upvote'} (${c.upvotes || 0})
                        </button>
                        ${c.status === 'Resolved' ? `<a href="feedback.html?id=${c.id}" class="btn btn-ghost btn-sm">⭐ Give Feedback</a>` : ''}
                    </div>

                    <!-- Admin remarks -->
                    ${c.remarks ? `
                        <div class="mt-md" style="background:var(--success-dim);border:1px solid var(--success);border-radius:var(--r-md);padding:var(--sm);">
                            <strong style="color:var(--success);">Admin Remarks</strong>
                            <p style="color:var(--text);margin-top:.25rem;">${c.remarks}</p>
                        </div>
                    ` : ''}
                </div>
            `;

            // Init detail map
            if (c.coordinates) {
                setTimeout(() => {
                    const dmap = L.map('detailMap').setView([c.coordinates.lat, c.coordinates.lng], 15);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                        attribution: '© OpenStreetMap © CartoDB',
                        subdomains: 'abcd',
                        maxZoom: 20
                    }).addTo(dmap);
                    L.marker([c.coordinates.lat, c.coordinates.lng]).addTo(dmap)
                        .bindPopup(c.location).openPopup();
                }, 100);
            }
        }

        async function upvote(complaintId) {
            try {
                const updated = await Storage.upvoteComplaint(complaintId);
                renderDetails(updated);
                loadComments();
            } catch (e) {
                alert('Failed to upvote.');
            }
        }

        async function loadComments() {
            const comments = await Storage.getComments(id);
            const section = document.getElementById('commentsSection');
            section.style.display = 'block';
            const list = document.getElementById('commentsList');

            if (comments.length === 0) {
                list.innerHTML = '<p class="text-secondary text-sm">No comments yet. Be the first!</p>';
            } else {
                list.innerHTML = comments.map(cm => `
                    <div class="comment-item">
                        <div class="comment-avatar">${cm.userName.charAt(0).toUpperCase()}</div>
                        <div class="comment-body">
                            <div class="comment-meta">
                                <span class="comment-name">${cm.userName}</span>
                                <span class="comment-time">${UI.formatDateTime(cm.timestamp)}</span>
                            </div>
                            <p class="comment-text">${cm.text}</p>
                        </div>
                    </div>
                `).join('');
            }
        }

        document.getElementById('commentSubmit').addEventListener('click', async () => {
            const input = document.getElementById('commentInput');
            const text = input.value.trim();
            if (!text) return;
            try {
                await Storage.addComment(id, text);
                input.value = '';
                loadComments();
            } catch (e) {
                alert('Failed to post comment.');
            }
        });

        document.getElementById('commentInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('commentSubmit').click();
        });

        init();
    </script>
</body>
</html>
