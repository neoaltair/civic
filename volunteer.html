<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer — CivicFix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script src="script.js"></script>

    <div class="dashboard-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-title">My Account</div>
            <ul class="sidebar-nav">
                <li><a href="citizen.html" class="sidebar-link">📊 Dashboard</a></li>
                <li><a href="submit_complaint.html" class="sidebar-link">➕ Submit Complaint</a></li>
                <li><a href="my_complaints.html" class="sidebar-link">📋 My Complaints</a></li>
                <li><a href="public_complaints.html" class="sidebar-link">🌍 Public Feed</a></li>
                <li><a href="map.html" class="sidebar-link">🗺️ Community Map</a></li>
                <li><a href="announcements.html" class="sidebar-link">📢 Announcements</a></li>
                <li><a href="volunteer.html" class="sidebar-link active">🤝 Volunteer</a></li>
                <li><a href="feedback.html" class="sidebar-link">⭐ Feedback</a></li>
            </ul>
            <div class="sidebar-footer">
                <a href="profile.html" class="sidebar-link">👤 Profile</a>
                <a href="#" onclick="Auth.logout()" class="sidebar-link" style="color:var(--danger)">🚪 Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div>
                    <h2>🤝 Volunteer Opportunities</h2>
                    <p class="text-secondary">Join community events and make an impact</p>
                </div>
                <button class="btn btn-ghost btn-sm" id="sidebarToggle">☰</button>
            </div>

            <div id="eventsList"><p class="text-secondary">Loading…</p></div>
        </main>
    </div>

    <script>
        const user = Auth.check();
        UI.renderNavbar();

        async function renderEvents() {
            const events = (await Storage.getEvents()).sort((a, b) => new Date(a.date) - new Date(b.date));
            const container = document.getElementById('eventsList');

            if (events.length === 0) {
                container.innerHTML = '<div class="card"><p class="text-secondary">No upcoming events at the moment.</p></div>';
                return;
            }

            container.innerHTML = events.map(e => {
                const isJoined = e.attendees.includes(user.email);
                return `
                    <div class="card event-card mb-sm">
                        <div class="flex justify-between items-start">
                            <div style="flex:1;min-width:0;">
                                <h4>${e.title}</h4>
                                <p class="text-secondary text-sm mt-xs">📅 ${new Date(e.date).toLocaleString()} &bull; 📍 ${e.location}</p>
                                <p class="text-sm mt-xs" style="color:var(--text-muted);">${e.description}</p>
                                <p class="text-sm mt-xs" style="color:var(--success);">👥 ${e.attendees.length} volunteers participating</p>
                            </div>
                            <button onclick="toggleJoin('${e.id}', ${isJoined})"
                                    class="btn ${isJoined ? 'btn-primary' : 'btn-outline'} btn-sm"
                                    style="margin-left:var(--sm);flex-shrink:0;min-width:120px;">
                                ${isJoined ? '✓ Joined' : '+ Volunteer'}
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function toggleJoin(id, isJoined) {
            try {
                if (isJoined) {
                    if (!confirm('Leave this event?')) return;
                    await Storage.leaveEvent(id);
                } else {
                    await Storage.joinEvent(id);
                }
                renderEvents();
            } catch (e) {
                alert('Action failed: ' + e.message);
            }
        }

        renderEvents();
    </script>
</body>
</html>
